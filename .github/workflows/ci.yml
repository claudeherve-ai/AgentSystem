name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff, non-blocking)
        continue-on-error: true
        run: ruff check .

      - name: Pre-pull sandbox image
        # GitHub-hosted runners ship the Docker daemon but no images. The live
        # docker_sandbox security tests (isolation, network-block, timeout) need
        # python:3.12-slim present locally, so pull it once up front. This makes
        # those tests genuinely run in CI instead of failing on a missing image.
        run: docker pull python:3.12-slim

      - name: Run tests
        # CODE_SANDBOX_AUTO_PULL is belt-and-suspenders: if the pre-pull step is
        # ever skipped, the sandbox auto-pulls the image on first use.
        env:
          CODE_SANDBOX_AUTO_PULL: "true"
        run: pytest -q
