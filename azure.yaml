name: agentsystem
services:
  app:
    project: .
    host: containerapp
    language: python
    dockerfile: Dockerfile
    resources:
      cpu: 1.0
      memory: 2.0Gi
    env:
      - name: AGENTSYSTEM_MODE
        value: dashboard
      - name: PYTHONPATH
        value: /app
    ports:
      - port: 8501
    ingress:
      external: true
      targetPort: 8501