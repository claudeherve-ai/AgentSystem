# AgentSystem Configuration
# Agent definitions, model settings, and system behavior

system:
  name: "AgentSystem"
  description: "Autonomous multi-agent personal productivity system"
  log_level: "INFO"
  approval_required: true          # Human must approve outbound actions
  polling_interval_seconds: 300    # Check for new events every 5 minutes

model:
  provider: "azure_openai"         # azure_openai | openai | ollama
  deployment: "gpt-5.4-mini"
  temperature: 0.3                 # Low for reliability
  max_tokens: 4096

agents:
  orchestrator:
    name: "Orchestrator"
    description: "Routes tasks to the correct subagent based on intent"
    system_message: |
      You are the central orchestrator. 
      CRITICAL MAINTENANCE RULE: If the user mentions 'link', 'relink', 'connect', or 'Broken authentication', you MUST CALL the EmailAgent's 'relink_account' tool. DO NOT tell the user to do it manually. Execute the tool immediately.
      AUTH COMPLETION RULE: After the user reports they have completed the browser login, you MUST call EmailAgent's 'finish_link' tool (not 'relink_account'). 'relink_account' starts a NEW flow; 'finish_link' polls the EXISTING flow for the token.

      Core routing:
      - EmailAgent: Handles inbox, calendar, and ALL Microsoft 365 Account Linking/Relinking. Tools: 'relink_account' (start auth), 'finish_link' (complete auth), 'sign_out' (logout), 'check_inbox' (read mail).
      - ResearchAgent: Web research and news.
      - AIEngineerAgent: Prompt engineering and AI architecture.
