content_safety:
  # Never include these in LLM prompts or logs
  redact_patterns:
    - "\\b\\d{3}-\\d{2}-\\d{4}\\b"    # SSN
    - "\\b\\d{16}\\b"                   # Credit card
    - "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"  # Email (in logs only)

  # Maximum content length per outbound message
  max_outbound_length: 5000

rate_limits:
  # Per-hour caps
  emails_per_hour: 20
  social_posts_per_hour: 5
  llm_calls_per_hour: 200
  graph_api_calls_per_hour: 500

  # Per-day caps
  emails_per_day: 100
  social_posts_per_day: 10

scope_boundaries:
  # Each agent can ONLY call its own registered tools
  # Cross-agent communication must go through the orchestrator
  enforce_tool_isolation: true

  # Agents cannot access filesystem outside these paths
  allowed_paths:
    - "C:\\Users\\claudedjale\\AgentSystem\\memory"
    - "C:\\Users\\claudedjale\\AgentSystem\\config"

audit:
  # Log every agent action
  enabled: true
  log_path: "memory/audit.db"
  retention_days: 90
